<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CRM — סוכנות דיגיטל</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#1a1a1a;direction:rtl;min-height:100vh}
/* topbar */
.topbar{background:#1d2b4f;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar h1{font-size:17px;color:#fff;font-weight:700}
.topbar .sub{font-size:11px;color:#8fa3c8;margin-top:1px}
.top-actions{display:flex;gap:8px}
/* buttons */
.btn{border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-family:Arial,sans-serif;border:1px solid transparent;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-white{background:#fff;color:#1d2b4f;border-color:#ddd}
.btn-blue{background:#2563eb;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-orange{background:#ea580c;color:#fff}
.btn-gray{background:#6b7280;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
/* main */
.main{padding:20px 24px;max-width:1300px;margin:0 auto}
/* alerts bar */
.alerts-bar{background:#fff;border:1px solid #fde68a;border-radius:10px;padding:10px 16px;margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.alert-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#92400e;background:#fef3c7;padding:3px 10px;border-radius:20px;font-weight:600}
/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e8e8e8}
.stat .lbl{font-size:11px;color:#888;margin-bottom:4px}
.stat .val{font-size:22px;font-weight:700}
.stat .val.green{color:#16a34a}
.stat .val.orange{color:#ea580c}
.stat .val.red{color:#dc2626}
.stat .val.blue{color:#2563eb}
.stat .trend{font-size:11px;color:#888;margin-top:2px}
/* filters */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filters input,.filters select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:Arial,sans-serif}
.filters input{flex:1;min-width:180px}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,.09);border-color:#bbb}
.card.warn{border-color:#f59e0b;border-left:4px solid #f59e0b}
.card.danger{border-color:#dc2626;border-left:4px solid #dc2626}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-b{background:#dbeafe;color:#1e40af}
.av-t{background:#d1fae5;color:#065f46}
.av-p{background:#ede9fe;color:#5b21b6}
.av-c{background:#fee2e2;color:#991b1b}
.av-g{background:#dcfce7;color:#14532d}
.cname{font-size:14px;font-weight:700;line-height:1.3}
.cagent{font-size:12px;color:#666}
.health-bar-wrap{margin:8px 0 10px;background:#f0f0f0;border-radius:20px;height:6px;overflow:hidden}
.health-bar{height:6px;border-radius:20px;transition:width .3s}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.bs{background:#dbeafe;color:#1e40af}
.be{background:#ede9fe;color:#5b21b6}
.bp{background:#d1fae5;color:#065f46}
.bw{background:#fef3c7;color:#92400e}
.cmeta{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:12px;border-top:1px solid #f0f0f0;padding-top:9px}
.ml{color:#999;font-size:11px}
.mv{font-weight:600;font-size:13px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px}
.dg{background:#16a34a}.do{background:#ea580c}.dr{background:#dc2626}
.card-actions{display:flex;gap:6px;margin-top:10px;border-top:1px solid #f5f5f5;padding-top:10px}
/* overlay / modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:720px;padding:0;margin:auto;overflow:hidden}
.modal-top{background:#1d2b4f;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-top h2{font-size:16px;color:#fff;font-weight:700}
.xbtn{background:transparent;border:none;cursor:pointer;font-size:18px;color:#aaa;padding:2px 6px}
.modal-body{padding:20px}
.tabs{display:flex;gap:0;border-bottom:2px solid #f0f0f0;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 14px;font-size:13px;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;color:#666;font-family:Arial,sans-serif;font-weight:600;margin-bottom:-2px}
.tab.on{color:#2563eb;border-bottom-color:#2563eb}
.tc{display:none}.tc.on{display:block}
/* form elements */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ir{margin-bottom:10px}
.ir label{display:block;font-size:11px;color:#888;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.ir .v{font-size:14px;font-weight:600}
.ir .v a{color:#2563eb;text-decoration:none}
.st{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f8f9fa;border-radius:8px;margin-bottom:5px;font-size:13px}
.pay-box{background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #e8e8e8}
.log-item{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.log-item:last-child{border-bottom:none}
.log-date{font-size:11px;color:#999;margin-top:2px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:#555;font-weight:700}
.fg input,.fg select,.fg textarea{padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;font-family:Arial,sans-serif}
.fg textarea{resize:vertical}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:12px;padding:4px 10px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;transition:all .15s}
.tag.on{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:.75rem;border-top:1px solid #f0f0f0}
.divider{height:1px;background:#f0f0f0;margin:12px 0}
.link-chip{display:inline-flex;align-items:center;gap:5px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;padding:3px 10px;font-size:12px;color:#1e40af;text-decoration:none}
/* ROI */
.roi-box{background:linear-gradient(135deg,#1d2b4f,#2563eb);border-radius:12px;padding:16px;color:#fff;margin-bottom:14px}
.roi-box .roi-title{font-size:12px;opacity:.8;margin-bottom:4px}
.roi-big{font-size:32px;font-weight:700;margin-bottom:2px}
.roi-sub{font-size:12px;opacity:.7}
.roi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.roi-cell{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 10px;text-align:center}
.roi-cell .rc-lbl{font-size:10px;opacity:.7;margin-bottom:3px}
.roi-cell .rc-val{font-size:16px;font-weight:700}
.roi-input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
/* campaign */
.camp-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8f9fa;border-radius:8px;margin-bottom:6px;font-size:13px;flex-wrap:wrap}
.camp-row .camp-name{font-weight:700;flex:1;min-width:80px}
.plat-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.plat-google{background:#fef3c7;color:#92400e}
.plat-meta{background:#dbeafe;color:#1e40af}
.plat-tiktok{background:#fce7f3;color:#9d174d}
.plat-linkedin{background:#e0f2fe;color:#0369a1}
.plat-other{background:#f3f4f6;color:#374151}
/* health score */
.health-score-big{font-size:48px;font-weight:700;text-align:center;margin:8px 0 4px}
.health-checks{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.health-check{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px}
.health-check.pass{background:#f0fdf4;color:#166534}
.health-check.fail{background:#fef2f2;color:#991b1b}
.health-check.warn{background:#fffbeb;color:#92400e}
/* timeline */
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.timeline-item:last-child{border-bottom:none}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-content{flex:1}
.tl-date{font-size:11px;color:#999}
/* quote */
.quote-area{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial,sans-serif;line-height:1.7;min-height:200px;resize:vertical;background:#fafafa;color:#1a1a1a}
/* mobile */
@media(max-width:600px){
  .topbar{padding:10px 14px}
  .top-actions .btn{padding:6px 8px;font-size:11px}
  .main{padding:12px 12px}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat{padding:10px 12px}
  .stat .val{font-size:18px}
  .filters{flex-direction:column;gap:8px}
  .filters input,.filters select{min-width:unset;width:100%}
  .grid{grid-template-columns:1fr;gap:12px}
  .card{padding:12px}
  .modal{border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-width:100%;max-height:92vh;overflow-y:auto}
  .overlay{padding:0;align-items:flex-end}
  .ig{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .roi-grid{grid-template-columns:1fr 1fr}
  .roi-input-row{grid-template-columns:1fr}
  .mfoot{flex-wrap:wrap}
  .mfoot .btn{flex:1;text-align:center}
  .card-actions{flex-wrap:wrap}
  .card-actions .btn{flex:1;text-align:center;font-size:11px;padding:6px 8px}
  .tabs{overflow-x:auto;flex-wrap:nowrap}
  .tab{white-space:nowrap;flex-shrink:0}
}
/* print / pdf */
@media print{
  .topbar,.filters,.card-actions,.btn,.tabs,.overlay{display:none!important}
  body{background:#fff}
  .main{padding:0}
  .card{break-inside:avoid;border:1px solid #ddd;margin-bottom:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar h1" style="font-size:17px;color:#fff;font-weight:700">CRM — סוכנות דיגיטל</div>
    <div class="sub">ניהול לקוחות מקצועי</div>
  </div>
  <div class="top-actions">
    <button class="btn btn-gray btn-sm" onclick="exportAllPDF()">ייצוא PDF</button>
    <button class="btn btn-white btn-sm" onclick="openNew()">+ לקוח חדש</button>
  </div>
</div>

<div class="main">
  <div class="alerts-bar" id="alertsBar" style="display:none"></div>
  <div class="stats" id="statsEl"></div>
  <div class="filters">
    <input type="text" placeholder="חיפוש לקוח, איש קשר..." id="srch" oninput="render()"/>
    <select id="fSvc" onchange="render()">
      <option value="">כל השירותים</option>
      <option>PPC</option><option>SEO</option><option>Social</option>
      <option>Reputation</option><option>בניית אתר</option><option>ייעוץ</option>
    </select>
    <select id="fPay" onchange="render()">
      <option value="">כל הסטטוסים</option>
      <option value="שולם">שולם</option><option value="ממתין">ממתין</option><option value="בפיגור">בפיגור</option>
    </select>
    <select id="fHealth" onchange="render()">
      <option value="">כל הציונים</option>
      <option value="high">בריאות גבוהה (80+)</option>
      <option value="mid">בינוני (50-79)</option>
      <option value="low">נמוך (מתחת 50)</option>
    </select>
  </div>
  <div class="grid" id="gridEl"></div>
</div>

<!-- View Modal -->
<div class="overlay" id="viewOv">
<div class="modal">
  <div class="modal-top">
    <h2 id="vtitle">לקוח</h2>
    <button class="xbtn" onclick="closeOv('viewOv')">✕</button>
  </div>
  <div class="modal-body">
    <div class="tabs">
      <button class="tab on" onclick="swTab('info',this)">פרטים</button>
      <button class="tab" onclick="swTab('services',this)">שירותים</button>
      <button class="tab" onclick="swTab('campaigns',this)">קמפיינים</button>
      <button class="tab" onclick="swTab('roi',this)">ROI</button>
      <button class="tab" onclick="swTab('payments',this)">תשלומים</button>
      <button class="tab" onclick="swTab('log',this)">לוג</button>
      <button class="tab" onclick="swTab('health',this)">בריאות</button>
      <button class="tab" onclick="swTab('quote',this)">הצעת מחיר</button>
    </div>
    <div id="tc-info" class="tc on"></div>
    <div id="tc-services" class="tc"></div>
    <div id="tc-campaigns" class="tc"></div>
    <div id="tc-roi" class="tc"></div>
    <div id="tc-payments" class="tc"></div>
    <div id="tc-log" class="tc"></div>
    <div id="tc-health" class="tc"></div>
    <div id="tc-quote" class="tc"></div>
  </div>
</div>
</div>

<!-- New Client Modal -->
<div class="overlay" id="newOv">
<div class="modal">
  <div class="modal-top"><h2>לקוח חדש</h2><button class="xbtn" onclick="closeOv('newOv')">✕</button></div>
  <div class="modal-body">
    <div class="fgrid">
      <div class="fg"><label>שם עסק *</label><input id="nn" placeholder="שם החברה"/></div>
      <div class="fg"><label>איש קשר *</label><input id="nc" placeholder="שם מלא"/></div>
      <div class="fg"><label>טלפון</label><input id="nph" placeholder="050-0000000"/></div>
      <div class="fg"><label>אימייל</label><input id="nem" placeholder="email@co.il"/></div>
      <div class="fg"><label>כתובת</label><input id="nad" placeholder="רחוב, עיר"/></div>
      <div class="fg"><label>אתר אינטרנט</label><input id="nweb" placeholder="https://www.example.co.il"/></div>
      <div class="fg"><label>ח.פ / עוסק מורשה</label><input id="nbn" placeholder="512345678"/></div>
      <div class="fg"><label>ערוץ הגעה</label>
        <select id="nsrc"><option value="">בחר...</option><option>פה לפה</option><option>גוגל</option><option>פייסבוק</option><option>לינקדאין</option><option>קר / outbound</option><option>אחר</option></select>
      </div>
      <div class="fg"><label>סוכן אחראי</label>
        <select id="nag"><option>אני</option><option>דניאל</option><option>שירה</option><option>אחר</option></select>
      </div>
      <div class="fg"><label>תחילת התקשרות</label><input type="date" id="nst"/></div>
      <div class="fg"><label>סיום / חידוש חוזה</label><input type="date" id="nen"/></div>
      <div class="fg"><label>יום הולדת איש קשר</label><input type="date" id="nbday"/></div>
      <div class="fg"><label>סכום חודשי (₪)</label><input type="number" id="nam" placeholder="0"/></div>
      <div class="fg"><label>סטטוס תשלום</label>
        <select id="nps"><option value="שולם">שולם</option><option value="ממתין">ממתין</option><option value="בפיגור">בפיגור</option></select>
      </div>
    </div>
    <div class="fg" style="margin-top:12px"><label>שירותים פעילים</label>
      <div class="tags" id="nsvcs">
        <span class="tag" onclick="tog(this)">PPC</span><span class="tag" onclick="tog(this)">SEO</span>
        <span class="tag" onclick="tog(this)">Social</span><span class="tag" onclick="tog(this)">Reputation</span>
        <span class="tag" onclick="tog(this)">בניית אתר</span><span class="tag" onclick="tog(this)">ייעוץ</span>
      </div>
    </div>
    <div class="fg" style="margin-top:10px"><label>סוג התקשרות</label>
      <div class="tags" id="neng">
        <span class="tag" onclick="tog(this)">ליווי שוטף</span><span class="tag" onclick="tog(this)">תפעול</span>
        <span class="tag" onclick="tog(this)">ייעוץ</span><span class="tag" onclick="tog(this)">הקמה חד-פעמית</span>
      </div>
    </div>
    <div class="fg" style="margin-top:10px"><label>מודל תשלום</label>
      <div class="tags" id="npay">
        <span class="tag" onclick="tog(this)">Retainer</span><span class="tag" onclick="tog(this)">CPA</span>
        <span class="tag" onclick="tog(this)">פרויקטלי</span><span class="tag" onclick="tog(this)">קבלנות</span>
      </div>
    </div>
    <div class="fg" style="margin-top:10px"><label>הערות</label>
      <textarea id="nnt" rows="2" placeholder="הערות חופשיות..."></textarea>
    </div>
    <div class="mfoot">
      <button class="btn btn-gray" onclick="closeOv('newOv')">ביטול</button>
      <button class="btn btn-blue" onclick="saveNew()">שמור לקוח</button>
    </div>
  </div>
</div>
</div>

<script>
const AVC=['av-b','av-t','av-p','av-c','av-g'];
function ini(n){return(n||'').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()}
function days(d){if(!d)return 9999;return Math.ceil((new Date(d)-new Date())/(864e5))}
function tenure(d){if(!d)return '—';const m=Math.floor((Date.now()-new Date(d))/(864e5*30));return m>=12?Math.floor(m/12)+' שנים':m+' ח׳'}
function fdate(d){return d?d.split('-').reverse().join('/'):'—'}
function dotCls(s){return s==='שולם'?'dg':s==='ממתין'?'do':'dr'}
function platCls(p){const m={גוגל:'plat-google','Google Ads':'plat-google',מטא:'plat-meta','Meta Ads':'plat-meta','Facebook':'plat-meta',טיקטוק:'plat-tiktok','TikTok':'plat-tiktok',לינקדאין:'plat-linkedin','LinkedIn':'plat-linkedin'};return m[p]||'plat-other'}

function healthScore(c){
  let s=0,checks=[];
  if(c.pstatus==='שולם'){s+=25;checks.push({ok:true,txt:'תשלום עדכני'})}
  else if(c.pstatus==='ממתין'){s+=10;checks.push({ok:'warn',txt:'ממתין לתשלום'})}
  else{checks.push({ok:false,txt:'בפיגור תשלום'})}
  if(c.end&&days(c.end)>30){s+=20;checks.push({ok:true,txt:'חוזה תקף'})}
  else if(c.end&&days(c.end)>0){s+=8;checks.push({ok:'warn',txt:'חידוש חוזה בקרוב'})}
  else{checks.push({ok:false,txt:'חוזה פג / לא הוגדר'})}
  if(c.log&&c.log.length>0){
    const last=new Date(c.log[0].d);const diff=(Date.now()-last)/(864e5);
    if(diff<=30){s+=20;checks.push({ok:true,txt:'פעילות מתועדת ב-30 יום אחרונים'})}
    else{s+=5;checks.push({ok:'warn',txt:'אין פעילות מעל 30 יום'})}
  }else{checks.push({ok:false,txt:'אין לוג פעילות'})}
  if(c.svcs&&c.svcs.length>0){s+=15;checks.push({ok:true,txt:'שירותים מוגדרים'})}
  else{checks.push({ok:false,txt:'אין שירותים מוגדרים'})}
  if(c.roi&&c.roi.mediaSpend&&c.roi.revenue){
    const r=calcROI(c.roi);
    if(r>=100){s+=20;checks.push({ok:true,txt:'ROI חיובי ('+r+'%)'})}
    else{s+=5;checks.push({ok:'warn',txt:'ROI נמוך ('+r+'%)'})}
  }else{checks.push({ok:'warn',txt:'ROI לא חושב'})}
  return{score:Math.min(s,100),checks};
}

function calcROI(roi){
  if(!roi||!roi.mediaSpend||!roi.revenue)return 0;
  const cost=(Number(roi.mediaSpend)||0)+(Number(roi.agencyCost)||0);
  const rev=Number(roi.revenue)||0;
  if(cost===0)return 0;
  return Math.round(((rev-cost)/cost)*100);
}

    <div class="roi-input-row">
      <div class="fg"><label>תקציב מדיה חודשי (₪)</label><input type="number" id="roi-ms-${c.id}" value="${roi.mediaSpend||''}" placeholder="0" oninput="previewROI(${c.id})"/></div>
      <div class="fg"><label>עלות סוכנות חודשית (₪)</label><input type="number" id="roi-ac-${c.id}" value="${roi.agencyCost||c.amount||''}" placeholder="0" oninput="previewROI(${c.id})"/></div>
      <div class="fg"><label>הכנסה שנוצרה (₪)</label><input type="number" id="roi-rv-${c.id}" value="${roi.revenue||''}" placeholder="0" oninput="previewROI(${c.id})"/></div>
      <div class="fg"><label>מספר לידים</label><input type="number" id="roi-ld-${c.id}" value="${roi.leads||''}" placeholder="0" oninput="previewROI(${c.id})"/></div>
      <div class="fg"><label>ערך עסקה ממוצע (₪)</label><input type="number" id="roi-ad-${c.id}" value="${roi.avgDeal||''}" placeholder="0" oninput="previewROI(${c.id})"/></div>
    </div>
    <div id="roi-preview-${c.id}" style="background:#f8f9fa;border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-blue btn-sm" onclick="saveROI(${c.id})">שמור ROI</button>
    <span id="roi-msg-${c.id}" style="font-size:12px;color:#16a34a;margin-right:8px"></span>`;
}

function previewROI(id){
  const ms=Number(document.getElementById('roi-ms-'+id).value)||0;
  const ac=Number(document.getElementById('roi-ac-'+id).value)||0;
  const rv=Number(document.getElementById('roi-rv-'+id).value)||0;
  const ld=Number(document.getElementById('roi-ld-'+id).value)||0;
  const ad=Number(document.getElementById('roi-ad-'+id).value)||0;
  const cost=ms+ac,profit=rv-cost,roi=cost>0?Math.round(((rv-cost)/cost)*100):0;
  const prev=document.getElementById('roi-preview-'+id);
  if(!prev)return;
  prev.style.display='block';
  prev.innerHTML=`<strong>תצוגה מקדימה:</strong> ROI = ${roi}% | רווח = ₪${profit.toLocaleString()}${ld?` | עלות לליד = ₪${Math.round(cost/ld).toLocaleString()}`:''}${ld&&ad?` | סגירה פוטנציאלית = ₪${(ld*ad).toLocaleString()}`:''}`;
}

function saveROI(id){
  const c=clients.find(x=>x.id===id);
  c.roi={mediaSpend:document.getElementById('roi-ms-'+id).value,agencyCost:document.getElementById('roi-ac-'+id).value,revenue:document.getElementById('roi-rv-'+id).value,leads:document.getElementById('roi-ld-'+id).value,avgDeal:document.getElementById('roi-ad-'+id).value};
  save();render();buildROI(c);buildHealth(c);
  const msg=document.getElementById('roi-msg-'+id);
  if(msg){msg.textContent='נשמר!';setTimeout(()=>{if(msg)msg.textContent=''},2000)}
}

      </div>

      ${p.note?`<div style="font-size:12px;color:#666;margin-bottom:6px">${p.note}</div>`:''}

        <input id="pl-${c.id}-${i}" type="text" placeholder="קישור לאישור (Drive/Dropbox...)" style="flex:1;min-width:160px;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-family:Arial" value="${p.link||''}"/>
        <input id="pn-${c.id}-${i}" type="text" placeholder="הערה" style="width:110px;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-family:Arial" value="${p.note||''}"/>
        <select id="pst-${c.id}-${i}" style="font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-family:Arial">
          <option ${p.status==='שולם'?'selected':''}>שולם</option>
          <option ${p.status==='ממתין'?'selected':''}>ממתין</option>
          <option ${p.status==='בפיגור'?'selected':''}>בפיגור</option>
        </select>

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <input id="pm-${c.id}" placeholder="חודש (מאי 2025)" style="flex:1;min-width:120px;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:Arial"/>
      <input id="pa-${c.id}" type="number" placeholder="סכום" style="width:110px;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:Arial" value="${c.amount||''}"/>
      <select id="pp-${c.id}" style="font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:Arial"><option>שולם</option><option>ממתין</option><option>בפיגור</option></select>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <input id="plink-${c.id}" placeholder="קישור לאישור תשלום" style="flex:1;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:Arial"/>
      <input id="pnote-${c.id}" placeholder="הערה" style="width:130px;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-family:Arial"/>

function savePayRow(cid,idx){
  const c=clients.find(x=>x.id===cid);
  c.payments[idx].link=document.getElementById('pl-'+cid+'-'+idx).value;
  c.payments[idx].note=document.getElementById('pn-'+cid+'-'+idx).value;
  c.payments[idx].status=document.getElementById('pst-'+cid+'-'+idx).value;
  save();render();buildPayments(c);
}

function delPay(cid,idx){
  if(!confirm('למחוק?'))return;
  const c=clients.find(x=>x.id===cid);c.payments.splice(idx,1);save();buildPayments(c);
}

function addPayment(cid){
  const c=clients.find(x=>x.id===cid);
  const month=document.getElementById('pm-'+cid).value.trim();
  if(!month){alert('יש להזין חודש');return}
  c.payments.unshift({month,amount:Number(document.getElementById('pa-'+cid).value)||c.amount||0,status:document.getElementById('pp-'+cid).value,link:document.getElementById('plink-'+cid).value.trim(),note:document.getElementById('pnote-'+cid).value.trim()});
  save();render();buildPayments(c);
}

function buildLog(c){
  document.getElementById('tc-log').innerHTML=`
    <div id="loglist-${c.id}">
      ${(c.log||[]).length?(c.log).map((l,i)=>`<div class="log-item">
        <div style="display:flex;justify-content:space-between;gap:8px">

          <button class="btn btn-red btn-xs" style="flex-shrink:0" onclick="delLog(${c.id},${i})">✕</button>

    </div>

function addLog(id){
  const txt=(document.getElementById('logtxt-'+id)||{}).value||'';
  if(!txt.trim())return;
  const c=clients.find(x=>x.id===id);
  c.log.unshift({t:txt.trim(),d:new Date().toISOString().slice(0,10),by:document.getElementById('logby-'+id).value||'אני'});
  save();buildLog(c);
  document.getElementById('logtxt-'+id).value='';
}

function delLog(cid,idx){
  const c=clients.find(x=>x.id===cid);c.log.splice(idx,1);save();buildLog(c);
}

function buildHealth(c){
  const {score,checks}=healthScore(c);

  document.getElementById('tc-health').innerHTML=`

}

function buildQuote(c){
  const today=new Date().toLocaleDateString('he-IL');
  const svcLines=(c.svcs||[]).map((s,i)=>`${i+1}. ${s}${c.eng&&c.eng[0]?' ('+c.eng[0]+')':''}`).join('\n')||'(לא הוגדרו שירותים)';
  const tpl=`הצעת מחיר\nמתאריך: ${today}\n\nלכבוד: ${c.contact||c.name},\nחברה: ${c.name}${c.biznum?' | ח.פ: '+c.biznum:''}\n\nשלום רב,\n\nלהלן הצעת המחיר עבור השירותים הבאים:\n\n${svcLines}\n\nסה"כ: ₪${(Number(c.amount)||0).toLocaleString()} לחודש\nמודל תשלום: ${(c.pay||[]).join(', ')||'—'}\n\nתוקף הצעה: 14 יום\nתנאי תשלום: שוטף + 30\n\nלאישור ולכל שאלה, אנא חזרו אלינו.\n\nבברכה,\nסוכנות דיגיטל`;
  document.getElementById('tc-quote').innerHTML=`
    <div style="font-size:12px;color:#888;margin-bottom:8px">ערוך את הטקסט לפני שליחה</div>

    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-blue" onclick="sendQuote(${c.id})">שלח במייל (Thunderbird) ↗</button>

function sendQuote(id){
  const c=clients.find(x=>x.id===id);
  const txt=document.getElementById('qtxt-'+id).value;
  window.location.href=`mailto:${c.email||''}?subject=${encodeURIComponent('הצעת מחיר — '+c.name)}&body=${encodeURIComponent(txt)}`;
}

function copyQuote(id){
  navigator.clipboard.writeText(document.getElementById('qtxt-'+id).value).then(()=>{
    const el=document.getElementById('qmsg-'+id);
    if(el){el.textContent='הועתק!';setTimeout(()=>{if(el)el.textContent=''},2000)}
  });
}
